<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Dashboard | Scarlet Dress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #fff0f5, #ffe4e1);
      color: #333;
    }

    header {
      background-color: #b93e64;
      padding: 20px;
      text-align: center;
      color: white;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card i {
      font-size: 2.5rem;
      color: #b93e64;
      margin-bottom: 15px;
    }

    .card h3 {
      margin: 10px 0 0;
      font-size: 1.2rem;
      color: #444;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      color: #b93e64;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <h1>Employee Dashboard</h1>
    <p>Welcome, manage your store efficiently</p>
  </header>

  <div class="dashboard">

    <div class="card" onclick="window.location.href='/customers'">
      <i class="fas fa-user-friends"></i>
      <h3>Customers</h3>
    </div>

    <div class="card" onclick="window.location.href='/order'">
      <i class="fas fa-shopping-cart profile-icon"></i>
      <h3>Orders</h3>
    </div>

    <div class="card" onclick="window.location.href='/WarehouseView'">
      <i class="fas fa-warehouse"></i>
      <h3>Warehouse</h3>
    </div>

    <div class="card" onclick="window.location.href='/employee_settings'">
      <i class="fas fa-cogs"></i>
      <h3>Settings</h3>
    </div>

    <div class="card" onclick="window.location.href='/'">
      <i class="fas fa-sign-out-alt"></i>
      <h3>Logout</h3>
    </div>

  </div>

  <footer>
    <a class="back-link" href="/">← Back to Welcome Page</a>
  </footer>

</body>
</html>
