<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manager Dashboard | Scarlet Dress</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #fff0f5, #ffe4e1);
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: #b93e64;
      padding: 30px 20px;
      text-align: center;
      color: white;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    header h1 { margin: 0; font-size: 2.2rem; }
    header p { opacity: 0.9; margin-top: 5px; }
    
    main {
        flex-grow: 1;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px 25px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.07);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .card:hover { 
        transform: translateY(-8px); 
        box-shadow: 0 12px 24px rgba(185, 62, 100, 0.15);
    }
    .card i { 
        font-size: 2.5rem; 
        color: #b93e64; 
        margin-bottom: 20px;
        width: 60px;
        height: 60px;
        line-height: 60px;
        background-color: #fff0f5;
        border-radius: 50%;
    }
    .card h3 { 
        margin: 10px 0 0; 
        font-size: 1.1rem;
        color: #444; 
        font-weight: 600;
    }
    footer { text-align: center; padding: 25px; }
    .logout-link { color: #b93e64; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Manager Dashboard</h1>
    <p>Welcome, {{ session.name }}! Manage your store efficiently.</p>
  </header>

  <main>
    <div class="dashboard">

      <div class="card" onclick="window.location.href='/order'">
          <i class="fas fa-receipt"></i>
          <h3>Orders</h3>
      </div>
      <div class="card" onclick="window.location.href='/tailoring'">
          <i class="fas fa-cut"></i> 
          <h3>Manage Tailoring Services</h3>
      </div>

      <div class="card" onclick="window.location.href='/products'">
          <i class="fas fa-boxes"></i>
          <h3>Inventory</h3>
      </div>
      <div class="card" onclick="window.location.href='/customers'">
          <i class="fas fa-user-friends"></i>
          <h3>Customers</h3>
      </div>
      <div class="card" onclick="window.location.href='/EmployeeMan'">
        <i class="fas fa-users-cog"></i>
        <h3>Employees</h3>
      </div>
      
      <div class="card" onclick="window.location.href='/unified_sales_report_page'">
          <i class="fas fa-chart-pie"></i>
          <h3>Sales Performance</h3>
      </div>
      <div class="card" onclick="window.location.href='/advanced_reports_page'">
          <i class="fas fa-tachometer-alt"></i>
          <h3>Advanced Reports</h3>
      </div>
       <div class="card" onclick="window.location.href='/Suppliers'">
        <i class="fas fa-truck"></i>
        <h3>Suppliers</h3>
      </div>
     
      <div class="card" onclick="window.location.href='/manager_settings'">
          <i class="fas fa-cogs"></i>
          <h3>Settings</h3>
      </div>
    </div>
  </main>

  <footer>
    <a class="logout-link" href="/logout">Logout</a>
  </footer>
</body>
</html>
