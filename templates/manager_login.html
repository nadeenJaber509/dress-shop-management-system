<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Login | Scarlet Dress</title>
    <!-- Theme Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap for layout -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fff0f5, #ffe4e1);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #b93e64;
            padding: 30px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        header .login-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            margin: 40px auto;
        }
        
        .form-label {
            font-weight: 600;
            color: #555;
        }
        
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ddd;
        }
        
        .form-control:focus {
            border-color: #b93e64;
            box-shadow: 0 0 0 0.2rem rgba(185, 62, 100, 0.25);
        }

        .btn-theme {
            background-color: #b93e64;
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.2s;
        }
        
        .btn-theme:hover {
            background-color: #a03656;
            color: white;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: auto;
            color: #777;
        }

        .back-link {
            text-decoration: none;
            color: #b93e64;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <i class="fas fa-user-shield login-icon"></i>
    <h1>Manager Login</h1>
    <p>Access the Manager Dashboard</p>
</header>

<div class="login-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('manager_login') }}">
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-theme w-100">Login</button>
    </form>
</div>

<footer>
    <a class="back-link" href="{{ url_for('home') }}">← Back to Welcome Page</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
