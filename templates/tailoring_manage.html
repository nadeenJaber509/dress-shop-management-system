<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Tailoring Services | Scarlet Dress</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fff0f5, #ffe4e1);
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        /* Style for the "Welcome" message at the top */
        .flash-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .card-header {
            font-size: 1.5rem;
            font-weight: 600;
            color: #b93e64;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 25px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1.5fr auto;
            gap: 15px;
            align-items: center;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: #b93e64;
            outline: none;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-add { background-color: #b93e64; }
        .btn-update { background-color: #28a745; }
        .btn-delete { background-color: #dc3545; }
        .services-table {
            width: 100%;
            border-collapse: collapse;
        }
        .services-table th {
            text-align: left;
            padding-bottom: 15px;
            color: #555;
            font-weight: 600;
        }
        .services-table td {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .services-table tr:last-child td {
            border-bottom: none;
        }
        .actions-cell {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- This handles any flashed messages, like the "Welcome back" message -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-message">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Add New Service Card -->
    <div class="card">
        <div class="card-header">Add New Service</div>
        <form action="{{ url_for('tailoring.manage_services') }}" method="POST">
            <input type="hidden" name="action" value="add">
            <div class="form-row">
                <input type="text" name="type" class="form-control" placeholder="Service Type (e.g., Hemming)" required>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="Price" required>
                <input type="text" name="duration" class="form-control" placeholder="Duration (e.g., 2-3 Days)">
                <button type="submit" class="btn btn-add">Add</button>
            </div>
        </form>
    </div>

    <!-- Existing Services Card -->
    <div class="card">
        <div class="card-header">Existing Services</div>
        <table class="services-table">
            <thead>
                <tr>
                    <th>Service Type</th>
                    <th>Price</th>
                    <th>Duration</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for service in services %}
            <tr>
                <!-- Each row is its own form for easy updates/deletes -->
                <form action="{{ url_for('tailoring.manage_services') }}" method="POST">
                    <input type="hidden" name="service_id" value="{{ service.service_id }}">
                    <td><input type="text" name="type" class="form-control" value="{{ service.type }}"></td>
                    <td><input type="number" step="0.01" name="price" class="form-control" value="{{ '%.2f'|format(service.price) }}"></td>
                    <td><input type="text" name="duration" class="form-control" value="{{ service.duration or '' }}"></td>
                    <td class="actions-cell">
                        <button type="submit" name="action" value="update" class="btn btn-update">Update</button>
                        <button type="submit" name="action" value="delete" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this service?')">Delete</button>
                    </td>
                </form>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
